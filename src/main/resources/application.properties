spring.application.name=EN.gestion

# Base de datos
spring.datasource.url=jdbc:postgresql://localhost:5432/engestion_db
spring.datasource.username=postgres
spring.datasource.password=tastarafu
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Puerto del servidor
server.port=8080

# Gemini API — setear como variable de entorno: GEMINI_API_KEY=AIza...
gemini.api-key=${GEMINI_API_KEY:}

# Tamaño máximo para upload de comprobantes
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB