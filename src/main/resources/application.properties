spring.application.name=EN.gestion

# Base de datos
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/engestion_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:tastarafu}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Puerto del servidor (Render inyecta PORT en runtime)
server.port=${PORT:8080}

# CORS — orígenes permitidos del frontend (coma-separado)
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}

# Gemini API — setear como variable de entorno: GEMINI_API_KEY=AIza...
gemini.api-key=${GEMINI_API_KEY:}

# Tamaño máximo para upload de comprobantes
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# JWT — setear JWT_SECRET como variable de entorno en producción (mínimo 32 chars)
jwt.secret=${JWT_SECRET:dev-secret-key-that-is-at-least-32-chars!!}
jwt.expiration-ms=86400000

# WhatsApp — Meta Cloud API
whatsapp.access-token=${WHATSAPP_ACCESS_TOKEN:}
whatsapp.verify-token=${WHATSAPP_VERIFY_TOKEN:whatsapp-verify-secret}