spring.application.name=EN.gestion

# Base de datos
spring.datasource.url=jdbc:postgresql://localhost:5432/engestion_db
spring.datasource.username=postgres
spring.datasource.password=tastarafu
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Puerto del servidor
server.port=8080

# Gemini API — setear como variable de entorno: GEMINI_API_KEY=AIza...
gemini.api-key=${GEMINI_API_KEY:}

# Tamaño máximo para upload de comprobantes
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# JWT — setear JWT_SECRET como variable de entorno en producción (mínimo 32 chars)
jwt.secret=${JWT_SECRET:dev-secret-key-that-is-at-least-32-chars!!}
jwt.expiration-ms=86400000

# WhatsApp — Meta Cloud API
whatsapp.access-token=${WHATSAPP_ACCESS_TOKEN:}
whatsapp.verify-token=${WHATSAPP_VERIFY_TOKEN:whatsapp-verify-secret}